name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: false

permissions:
  contents: write

env:
  # Rust 编译优化
  CARGO_INCREMENTAL: 1
  CARGO_TERM_COLOR: always
  # 减少二进制大小
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64)
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          # Windows x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          # Windows ARM64
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            label: Windows-arm64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── 缓存配置 ──

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.PNPM_STORE_PATH }}
          key: pnpm-store-${{ matrix.platform }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ matrix.platform }}-
            pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: ${{ matrix.target }}
          shared-key: tauri-${{ matrix.target }}
          cache-on-failure: true
          cache-all-crates: true

      # ── 构建 ──

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: 'AiDocPlus ${{ github.ref_name }}'
          releaseBody: |
            AiDocPlus ${{ github.ref_name }} 发布

            ## 下载
            - **macOS (Apple Silicon)**: .dmg (arm64)
            - **Windows (x64)**: .exe
            - **Windows (ARM64)**: .exe
          releaseDraft: true
          prerelease: false
