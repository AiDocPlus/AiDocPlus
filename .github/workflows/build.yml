name: Build Windows x64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.6)'
        required: false
        default: ''

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: '1'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout 所有仓库到同级目录 ──
      - name: Checkout AiDocPlus (build target)
        uses: actions/checkout@v4
        with:
          path: AiDocPlus
          persist-credentials: false

      - name: Checkout AiDocPlus-Main
        uses: actions/checkout@v4
        with:
          repository: AiDocPlus/AiDocPlus-Main
          path: AiDocPlus-Main

      - name: Checkout AiDocPlus-PromptTemplates
        uses: actions/checkout@v4
        with:
          repository: AiDocPlus/AiDocPlus-PromptTemplates
          path: AiDocPlus-PromptTemplates

      - name: Checkout AiDocPlus-DocTemplates
        uses: actions/checkout@v4
        with:
          repository: AiDocPlus/AiDocPlus-DocTemplates
          path: AiDocPlus-DocTemplates

      - name: Checkout AiDocPlus-AIProviders
        uses: actions/checkout@v4
        with:
          repository: AiDocPlus/AiDocPlus-AIProviders
          path: AiDocPlus-AIProviders

      - name: Checkout AiDocPlus-Plugins
        uses: actions/checkout@v4
        with:
          repository: AiDocPlus/AiDocPlus-Plugins
          path: AiDocPlus-Plugins

      - name: Checkout AiDocPlus-ResourceManager
        uses: actions/checkout@v4
        with:
          repository: AiDocPlus/AiDocPlus-ResourceManager
          path: AiDocPlus-ResourceManager

      # ── 2. 安装工具链 ──
      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./AiDocPlus/apps/desktop/src-tauri -> target
            ./AiDocPlus-ResourceManager -> target

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('AiDocPlus/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ── 3. 总装（assemble） ──
      - name: Deploy AiDocPlus-Main (rsync replacement)
        shell: bash
        run: |
          echo "Deploy AiDocPlus-Main..."
          MAIN_DIR="AiDocPlus-Main"
          TARGET_DIR="AiDocPlus"

          cd "$MAIN_DIR"
          find . -type f \
            ! -path '*/node_modules/*' \
            ! -path '*/.git/*' \
            ! -path '*/.turbo/*' \
            ! -path '*/target/*' \
            ! -path '*/.DS_Store' \
            ! -path '*/plugins-repo/*' \
            ! -path '*/.claude/*' \
            ! -path '*/scripts/deploy.sh' \
            ! -name 'pnpm-lock.yaml' \
            ! -path '*/packages/shared-types/src/generated/*.generated.ts' \
            ! -path '*/apps/desktop/src-tauri/bundled-resources/*' \
            ! -path '*/apps/desktop/src-ui/src/plugins/*/*' \
            | while IFS= read -r file; do
              dir=$(dirname "$file")
              mkdir -p "../${TARGET_DIR}/${dir}"
              cp -f "$file" "../${TARGET_DIR}/${file}"
            done
          cd ..

          mkdir -p "${TARGET_DIR}/packages/shared-types/src/generated"
          echo "AiDocPlus-Main deployed"

      - name: Deploy resource repositories
        shell: bash
        run: |
          for repo in PromptTemplates DocTemplates AIProviders; do
            REPO_DIR="AiDocPlus-${repo}"
            echo "Deploy ${REPO_DIR}..."
            if [ -f "${REPO_DIR}/scripts/build.sh" ]; then
              bash "${REPO_DIR}/scripts/build.sh"
            fi
            bash "${REPO_DIR}/scripts/deploy.sh"
          done

          echo "Deploy AiDocPlus-Plugins..."
          bash AiDocPlus-Plugins/scripts/deploy.sh

          echo "Assembly complete"

      - name: Build unified resource manager (Windows exe)
        shell: bash
        run: |
          cd AiDocPlus-ResourceManager
          pnpm install

          # Build the unified resource manager
          echo "[tauri build] resource-manager"
          (cd apps/resource-manager && npx tauri build --target x86_64-pc-windows-msvc 2>&1 | tail -5)

          TARGET_DIR="../AiDocPlus/apps/desktop/src-tauri/bundled-resources/managers"
          mkdir -p "$TARGET_DIR"
          cp "target/x86_64-pc-windows-msvc/release/resource-manager.exe" "$TARGET_DIR/"
          echo "[done] Deployed unified resource-manager.exe"

      # ── 4. 安装依赖并构建 ──
      - name: Install frontend dependencies
        working-directory: AiDocPlus
        run: pnpm install

      - name: Build Tauri app (Windows x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./AiDocPlus/apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'AiDocPlus __VERSION__'
          releaseBody: |
            ## AiDocPlus __VERSION__

            ### 下载
            - **Windows (x64)**: .exe 安装程序（NSIS）

            ### 更新说明
            请查看 CHANGELOG.md 获取详细更新内容。
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
