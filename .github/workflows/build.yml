name: Build Windows x64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.3.0)'
        required: false
        default: ''

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: '1'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 安装工具链 ──
      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target
          cache-all-crates: true
          cache-on-failure: true

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ── 3. 构建资源 ──
      - name: Build resources
        shell: bash
        run: bash scripts/build-resources.sh

      # ── 4. 安装依赖并构建 ──
      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Determine version tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(python -c "import json; print(json.load(open('apps/desktop/src-tauri/tauri.conf.json'))['version'])")
            echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          fi
          echo "Resolved tag: $(cat $GITHUB_OUTPUT)"

      - name: Build Tauri app (Windows x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./apps/desktop
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'AiDocPlus ${{ steps.version.outputs.tag }}'
          releaseBody: |
            ## AiDocPlus ${{ steps.version.outputs.tag }}

            ### 下载
            - **Windows (x64)**: .exe 安装程序（NSIS）
            - **macOS (Apple Silicon)**: .dmg 安装包

            ### 更新说明
            请查看 CHANGELOG.md 获取详细更新内容。
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
