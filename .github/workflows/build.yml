name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # Rust 编译优化
  CARGO_INCREMENTAL: 1
  CARGO_TERM_COLOR: always
  # 减少二进制大小
  RUSTFLAGS: "-C debuginfo=0"
  # pnpm 全局 store 路径
  PNPM_HOME: /opt/pnpm

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64)
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          # Windows x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          # Windows ARM64
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            label: Windows-arm64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Deploy plugins
        shell: bash
        run: AIDOCPLUS_PATH="${GITHUB_WORKSPACE}" bash plugins-repo/scripts/deploy.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # ── 缓存配置 ──

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.PNPM_STORE_PATH }}
          key: pnpm-store-${{ matrix.platform }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ matrix.platform }}-
            pnpm-store-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: ${{ matrix.target }}
          shared-key: tauri-${{ matrix.target }}
          cache-on-failure: true
          cache-all-crates: true

      # ── 构建 ──

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AiDocPlus-${{ matrix.label }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
